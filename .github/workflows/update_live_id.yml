name: Update YouTube Live IDs (hourly)

on:
  workflow_dispatch: {}
  schedule:
    # GitHub cron is UTC. "30 * * * *" => runs at :00 IST every hour.
    - cron: "30 * * * *"

concurrency:
  group: update-videoid-hourly
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest

    env:
      YT_API_KEY: ${{ secrets.YT_API_KEY }}

      # Firebase admin json (base64 or raw json string) - your script supports both
      FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}

      # (Optional) if you use these elsewhere, keep them
      FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
      FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
      FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # ✅ Debug: confirm the file exists
      - name: Debug - show files
        run: |
          pwd
          git branch --show-current
          ls -la
          echo "---- check extract/update_video_id_cron.js ----"
          ls -la extract/update_video_id_cron.js || true
          echo "---- find file ----"
          find . -maxdepth 3 -type f -name "update_video_id_cron.js"

      - name: Run updater
        run: node extract/update_video_id_cron.js
